baseURL = 'https://meetup.metacog.co.kr/'
locale = 'en-us'
title = 'Meetup Insights'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  # 홈 카드 목록은 밋업 정리(posts)만 — 리서치 글은 Blog 메뉴에서 열람
  mainSections = ['posts']
  title = 'Meetup Insights'
  description = '밋업 스크립트를 붙여넣으면 핵심 정리와 기술 리서치 포스트로 자동 게시하는 사이트'
  author = 'jeonck'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = 'Meetup Insights 🎤'
    Content = '밋업 녹취 스크립트를 넣으면 Claude가 핵심 내용을 쉽게 정리하고, 등장한 기술과 추구 방향을 참고 링크와 함께 게시합니다. 상단 Add Transcript 버튼으로 스크립트를 추가하세요.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/jeonck/meetup'

[menu]
  [[menu.main]]
    identifier = 'input'
    name = 'Add Transcript ✏️'
    url = 'https://github.com/jeonck/meetup/edit/main/input/script.md'
    weight = 5
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/blog/'
    weight = 15
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']

# Quiz sections use raw HTML <details>/<summary> accordions in generated posts
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
